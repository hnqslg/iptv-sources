name: Auto Update IPTV Sources

on:
  schedule:
    - cron: '0 3 * * *'  # 北京时间每天11:00 (UTC 3:00)
  workflow_dispatch:
  push:
    branches: [ main, master ]

# 设置环境变量，强制使用Node.js 24
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'  # 保持Node.js 20，但actions会使用Node.js 24运行

      - name: Install dependencies
        run: |
          npm install -g pnpm
          pnpm install

      - name: Run update script
        run: |
          # 根据iptv-sources项目的实际更新命令调整
          pnpm build
          pnpm m3u
          # 或使用项目的其他更新命令

      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add .
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-update: $(date +'%Y-%m-%d %H:%M')"
          git push
